services:
  postgres:
    image: docker.io/postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POC_POSTGRES_USER}
      POSTGRES_PASSWORD: ${POC_POSTGRES_PASSWORD}
      POSTGRES_DB: ${POC_POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [poc-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 30

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:25.8
    user: "101:101"
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${POC_CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${POC_CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    networks: [poc-internal]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: docker.io/redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_AUTH: ${POC_REDIS_AUTH}
    command: ["redis-server", "--requirepass", "${POC_REDIS_AUTH}", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    networks: [poc-internal]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_AUTH\" ping | grep -q PONG"]
      interval: 3s
      timeout: 3s
      retries: 30

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${POC_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${POC_MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [poc-internal]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 30

  minio-init:
    image: quay.io/minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${POC_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${POC_MINIO_ROOT_PASSWORD}
    entrypoint: >-
      /bin/sh -c 'mc alias set poc http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
      mc mb --ignore-existing poc/langfuse-poc-synthetic'
    networks: [poc-internal]

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on: &langfuse-depends
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment: &langfuse-env
      NEXTAUTH_URL: ${POC_NEXTAUTH_URL}
      DATABASE_URL: postgresql://${POC_POSTGRES_USER}:${POC_POSTGRES_PASSWORD}@postgres:5432/${POC_POSTGRES_DB}
      SALT: ${POC_SALT}
      ENCRYPTION_KEY: ${POC_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: ${POC_TELEMETRY_ENABLED}
      CLICKHOUSE_MIGRATION_URL: clickhouse://${POC_CLICKHOUSE_USER}:${POC_CLICKHOUSE_PASSWORD}@clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${POC_CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${POC_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${POC_REDIS_AUTH}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-poc-synthetic
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${POC_MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${POC_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-poc-synthetic
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${POC_MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${POC_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "true"
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse-poc-synthetic
      LANGFUSE_S3_BATCH_EXPORT_PREFIX: exports/
      LANGFUSE_S3_BATCH_EXPORT_REGION: auto
      LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://minio:9000
      LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: ${POC_MINIO_ROOT_USER}
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: ${POC_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: "true"
    networks: [poc-internal]

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: unless-stopped
    depends_on: *langfuse-depends
    ports:
      - 127.0.0.1:${POC_LANGFUSE_WEB_PORT}:3000
    environment:
      <<: *langfuse-env
      NEXTAUTH_SECRET: ${POC_NEXTAUTH_SECRET}
      LANGFUSE_INIT_ORG_ID: ${POC_LANGFUSE_INIT_ORG_ID}
      LANGFUSE_INIT_ORG_NAME: ${POC_LANGFUSE_INIT_ORG_NAME}
      LANGFUSE_INIT_PROJECT_ID: ${POC_LANGFUSE_INIT_PROJECT_ID}
      LANGFUSE_INIT_PROJECT_NAME: ${POC_LANGFUSE_INIT_PROJECT_NAME}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${POC_LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${POC_LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${POC_LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${POC_LANGFUSE_INIT_USER_NAME}
      LANGFUSE_INIT_USER_PASSWORD: ${POC_LANGFUSE_INIT_USER_PASSWORD}
    networks: [poc-internal]

networks:
  poc-internal:
    name: langfuse-poc-internal
    driver: bridge

volumes:
  postgres-data:
  clickhouse-data:
  clickhouse-logs:
  redis-data:
  minio-data:
